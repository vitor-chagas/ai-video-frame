services:
  db:
    image: postgres:16-alpine
    container_name: ai-video-frame-db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_video_frame
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ai_video_frame"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ai-video-frame-app
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: ${NODE_ENV:-production}
    # depends_on is kept but the app uses the external DATABASE_URL if provided in .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

volumes:
  postgres_data:
